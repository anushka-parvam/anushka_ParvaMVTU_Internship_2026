<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Registration Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7fb;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
        }

        #resultCard {
            display: none;
        }
    </style>

</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">Student Registration Form</h2>

        <div class="row justify-content-center">
            <div class="col-md-8 form-container">

                <form id="studentForm">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" id="name" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="text" id="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" id="phone" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Course</label>
                        <select id="course" class="form-select">
                            <option value="">Select Course</option>
                            <option>Computer Science</option>
                            <option>Data Science</option>
                            <option>Artificial Intelligence</option>
                            <option>Web Development</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Gender</label><br>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" value="Male">
                            <label class="form-check-label">Male</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" value="Female">
                            <label class="form-check-label">Female</label>
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Skills</label><br>

                        <div class="form-check">
                            <input class="form-check-input skill" type="checkbox" value="HTML">
                            <label class="form-check-label">HTML</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input skill" type="checkbox" value="CSS">
                            <label class="form-check-label">CSS</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input skill" type="checkbox" value="JavaScript">
                            <label class="form-check-label">JavaScript</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input skill" type="checkbox" value="Python">
                            <label class="form-check-label">Python</label>
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea id="address" class="form-control"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>

                </form>

            </div>
        </div>


        <!-- Result Card -->

        <div class="row justify-content-center mt-4">
            <div class="col-md-6">

                <div class="card" id="resultCard">

                    <div class="card-header bg-success text-white">
                        Registered Student Details
                    </div>

                    <div class="card-body">

                        <p><strong>Name:</strong> <span id="rName"></span></p>
                        <p><strong>Email:</strong> <span id="rEmail"></span></p>
                        <p><strong>Phone:</strong> <span id="rPhone"></span></p>
                        <p><strong>Course:</strong> <span id="rCourse"></span></p>
                        <p><strong>Gender:</strong> <span id="rGender"></span></p>
                        <p><strong>Skills:</strong> <span id="rSkills"></span></p>
                        <p><strong>Address:</strong> <span id="rAddress"></span></p>

                    </div>

                </div>

            </div>
        </div>

    </div>

    <script>

        document.getElementById("studentForm").addEventListener("submit", function (e) {

            e.preventDefault()

            let name = document.getElementById("name").value.trim()
            let email = document.getElementById("email").value.trim()
            let phone = document.getElementById("phone").value.trim()
            let course = document.getElementById("course").value
            let address = document.getElementById("address").value

            let gender = document.querySelector('input[name="gender"]:checked')

            let skills = []
            document.querySelectorAll(".skill:checked").forEach(function (skill) {
                skills.push(skill.value)
            })


            if (name === "") {
                alert("Name cannot be empty")
                return
            }

            if (!email.includes("@")) {
                alert("Email must contain @")
                return
            }

            if (phone.length !== 10 || isNaN(phone)) {
                alert("Phone number must be 10 digits")
                return
            }


            document.getElementById("rName").textContent = name
            document.getElementById("rEmail").textContent = email
            document.getElementById("rPhone").textContent = phone
            document.getElementById("rCourse").textContent = course
            document.getElementById("rGender").textContent = gender ? gender.value : ""
            document.getElementById("rSkills").textContent = skills.join(", ")
            document.getElementById("rAddress").textContent = address

            document.getElementById("resultCard").style.display = "block"
            document.getElementById("studentForm").reset()
        })

    </script>

</body>

</html>
